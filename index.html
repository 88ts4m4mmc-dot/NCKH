<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem Mô Hình 3D</title>
    <!-- Thư viện model-viewer của Google -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.0.0/model-viewer.min.js"></script>
    <style>
        model-viewer { width: 100%; height: 500px; }
    </style>
</head>
<body>
    <h1>Mô hình 3D của tôi</h1>
    
    <!-- Hiển thị mô hình 3D xoay được bằng chuột/tay -->
    <model-viewer 
     src="model.glb"
        ar 
        auto-rotate 
        camera-controls 
        shadow-intensity="1">
    </model-viewer>
</body>
</html>
